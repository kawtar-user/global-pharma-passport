version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: global-pharma-passport-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: global_pharma_passport
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d global_pharma_passport"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
